<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Detalle del planeta</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    body { background-color: #000000; }

    #imagen-planeta {
      display: block;
      margin: 0 auto;
      max-width: 300px;
    }

    @keyframes tempReveal {
      from { opacity: 0; transform: translateY(30px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .temp-box { display: none; }
    .temp-box.visible {
      display: block;
      animation: tempReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    html, body {
      background-color: #000000 !important;
    }
    body::before {
      background-image: url("https://www.transparenttextures.com/patterns/stardust.png") !important;
      opacity: 0.6 !important;
      z-index: 0 !important;
    }

    .detalle-seccion {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-top: 24px;
    }
  </style>
</head>

<body style="background-color: #000000 !important; position: relative;">

  <!-- HEADER -->
  <header class="bg-black shadow-lg">
    <nav class="navbar navbar-expand-lg navbar-dark container">
      <a class="navbar-brand fw-bold text-info" href="index.html">
        🌌 Exploración Espacial
      </a>
    </nav>
  </header>

  <!-- BREADCRUMB -->
  <div class="container mt-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb" style="background:transparent;">
        <li class="breadcrumb-item">
          <a href="index.html" class="text-info">Inicio</a>
        </li>
        <li class="breadcrumb-item active text-white" id="breadcrumb-planeta">
          Detalle
        </li>
      </ol>
    </nav>
  </div>

  <main class="container mt-3 pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- CARD PRINCIPAL -->
        <div class="card text-center mb-4">
          <div class="card-body">
            <h1 id="nombre-planeta" class="titulo-planeta mb-3"></h1>
            <img id="imagen-planeta" class="img-fluid my-3" alt="" style="max-height:280px;object-fit:contain;" />
            <p id="descripcion-planeta" class="text-white"></p>

            <!-- TEMPERATURA ACTUAL -->
            <button id="btn-temperatura" class="btn btn-primary mt-3">
              🌡 Conocer su temperatura actual
            </button>
            <div id="temperatura" class="temp-box mt-3 mx-auto" style="max-width:300px;"></div>
          </div>
        </div>

        <!-- PRONÓSTICO SEMANAL -->
        <div id="pronostico-semanal" class="detalle-seccion">
          <p class="text-white text-center">Cargando pronóstico…</p>
        </div>

        <!-- ESTADÍSTICAS DE LA SEMANA -->
        <div id="estadisticas-semana" class="detalle-seccion">
          <p class="text-white text-center">Calculando estadísticas…</p>
        </div>

        <!-- VOLVER -->
        <div class="text-center mt-4">
          <a href="index.html" class="btn btn-outline-info">⬅ Volver al inicio</a>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-black text-white pt-4 pb-3 mt-4">
    <div class="container text-center">
      <p class="mb-0" style="color:rgba(255,255,255,0.5);font-size:0.85rem;">
        © 2026 Exploración Espacial | Clima Front-End 🚀
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
